<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Angela McLeary (AngelaMcLeary)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="style.css" rel="stylesheet" />
    
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <header>
      <h1><i class="fa-solid fa-tv"></i>
TV Show Project</h1>

      <div id="breadcrumb">
    <span id="breadcrumb-home" class="breadcrumb-link">
        <i class="fa-solid fa-house"></i>
        Home
    </span>
    <span class="breadcrumb-separator">›</span>
    <span id="breadcrumb-shows" class="breadcrumb-link">Shows</span>
</div>

      <nav class="searchbar">
        <div id="show-search-container" class="select">
          <label for="show-search">Search Shows</label>
          <input type="text" id="show-search" placeholder="Search shows..." />
        </div>

        <div id="episode-search-container" class="select hidden">
          <label for="episode-search">Search Episodes</label>
          <input
            type="text"
            id="episode-search"
            placeholder="Search episodes..."
          />
        </div>

        <!-- dropdown to select show -->
        <div id="show-selector-container" class="select">
          <label for="show-menu">Show:</label>
          <select id="show-menu" class="select">
            <option value="">All Shows</option>
          </select>
        </div>

        <!-- dropdown to select episode -->
        <div id="episode-selector-container" class="select hidden">
          <label for="episodes-menu">Episode:</label>
          <select id="episodes-menu" class="select">
            <option value="all">All Episodes</option>
          </select>
        </div>

        <!-- displaying -->
        <span id="count-info"></span>
      </nav>
    </header>

    <main id="root">
      <!--       <div class="loading">
        <div class="spinner"></div>
        <p>Loading episodes… please wait.</p>
      </div> -->
    </main>
    <!-- Loads a provided function called getAllEpisodes() which returns all episodes -->
    <footer>
      <a href="https://www.tvmaze.com/">Data from TVmaze</a>
      licensed under
      <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a>
    </footer>
    <!-- Loads YOUR javascript code -->
    <script src="script.js"></script>
  </body>
</html>
